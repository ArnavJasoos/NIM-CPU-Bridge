# nim-cpu-bridge: configs/model_profiles.yaml
#
# Per-model tuning profiles. The orchestrator loads the matching profile
# at startup based on NIM_MODEL_NAME. Unrecognised models use defaults.
#
# Fields:
#   backend:      preferred CPU backend (auto / llama_cpp / onnxruntime / ctransformers)
#   quant:        GGUF quantisation type
#   context_len:  KV cache context window tokens
#   threads_pct:  fraction of CPU threads to use (0.0–1.0)
#   min_ram_gb:   minimum RAM required (soft warning, not enforced)
#   notes:        freeform notes

defaults:
  backend:      auto
  quant:        Q4_K_M
  context_len:  4096
  threads_pct:  0.9
  min_ram_gb:   16

profiles:

  # ── Meta Llama 3.1 ─────────────────────────────────────────────────────────
  "meta/llama-3.1-8b-instruct":
    backend:      llama_cpp
    quant:        Q4_K_M
    context_len:  8192
    min_ram_gb:   8
    notes:        "Excellent CPU perf with Q4_K_M; fits in 8 GB RAM"

  "meta/llama-3.1-70b-instruct":
    backend:      llama_cpp
    quant:        Q3_K_S
    context_len:  4096
    threads_pct:  1.0
    min_ram_gb:   40
    notes:        "Requires 64 GB RAM at Q4; use Q3_K_S to fit in 40 GB"

  "meta/llama-3.1-405b-instruct":
    backend:      llama_cpp
    quant:        Q2_K
    context_len:  2048
    threads_pct:  1.0
    min_ram_gb:   200
    notes:        "Extreme RAM requirements; not recommended on single node"

  # ── Meta Llama 3.2 ─────────────────────────────────────────────────────────
  "meta/llama-3.2-1b-instruct":
    backend:      llama_cpp
    quant:        Q8_0
    context_len:  8192
    min_ram_gb:   2
    notes:        "Tiny model; Q8 gives near-lossless quality"

  "meta/llama-3.2-3b-instruct":
    backend:      llama_cpp
    quant:        Q6_K
    context_len:  8192
    min_ram_gb:   4

  # ── Mistral ────────────────────────────────────────────────────────────────
  "mistralai/mistral-7b-instruct-v0.3":
    backend:      llama_cpp
    quant:        Q4_K_M
    context_len:  8192
    min_ram_gb:   6

  "mistralai/mixtral-8x7b-instruct-v0.1":
    backend:      llama_cpp
    quant:        Q3_K_M
    context_len:  4096
    min_ram_gb:   28
    notes:        "MoE model — llama.cpp handles sparse expert routing on CPU"

  # ── Microsoft Phi ──────────────────────────────────────────────────────────
  "microsoft/phi-3-mini-4k-instruct":
    backend:      onnxruntime
    context_len:  4096
    min_ram_gb:   4
    notes:        "ONNX Runtime gives better throughput than llama.cpp for Phi-3"

  "microsoft/phi-3-medium-4k-instruct":
    backend:      onnxruntime
    context_len:  4096
    min_ram_gb:   16

  # ── NVIDIA Nemotron ────────────────────────────────────────────────────────
  "nvidia/nemotron-mini-4b-instruct":
    backend:      llama_cpp
    quant:        Q5_K_M
    context_len:  4096
    min_ram_gb:   4

  # ── Google Gemma ───────────────────────────────────────────────────────────
  "google/gemma-2b":
    backend:      llama_cpp
    quant:        Q8_0
    context_len:  8192
    min_ram_gb:   3

  "google/gemma-7b":
    backend:      llama_cpp
    quant:        Q4_K_M
    context_len:  8192
    min_ram_gb:   6
